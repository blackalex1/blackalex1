<svg width="850" height="172" viewBox="0 0 850 172" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg:          #0d1117;
      --accent:      #00FFAA;
      --accent-dim:  #00FFAA1a;
      --accent-mid:  #00FFAA50;
      --border:      #21262d;
      --muted:       #8b949e;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:         #ffffff;
        --accent:     #1a7f37;
        --accent-dim: #1a7f3712;
        --accent-mid: #1a7f3740;
        --border:     #d0d7de;
        --muted:      #57606a;
      }
    }

    .st-card-bg   { fill: var(--bg); stroke: var(--border); stroke-width: 1.5; }
    .st-card-glow { fill: url(#st-glow); }

    .st-title-txt {
      font: 700 10px 'Segoe UI', Ubuntu, sans-serif;
      fill: var(--muted);
      text-transform: uppercase;
      letter-spacing: 3.5px;
    }
    .st-title-accent { fill: var(--accent); }

    .st-divider   { stroke: var(--border); stroke-width: 1; opacity: 0.7; }
    .st-grid-line { stroke: var(--accent); opacity: 0.035; stroke-width: 1; }

    .st-chip-bg     { fill: var(--accent-dim); }
    .st-chip-border { fill: none; stroke: var(--accent-mid); stroke-width: 1; }
    .st-chip-text   {
      font: 600 11px 'JetBrains Mono', 'Cascadia Code', monospace;
      fill: var(--accent);
      letter-spacing: 0.2px;
    }

    .st-bracket {
      stroke: var(--accent);
      stroke-width: 1.5;
      fill: none;
      opacity: 0.45;
    }

    .st-pulse-dot {
      fill: var(--accent);
      animation: st-pdot 2.5s ease-in-out infinite;
    }
    @keyframes st-pdot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    .st-chip-anim {
      opacity: 0;
      animation: st-chip-in 0.35s ease forwards;
    }
    @keyframes st-chip-in {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>

  <defs>
    <linearGradient id="st-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00FFAA" stop-opacity="0.055"/>
      <stop offset="100%" stop-color="#00FFAA" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="850" height="172" rx="15" class="st-card-bg"/>
  <rect width="850" height="172" rx="15" class="st-card-glow"/>

  <!-- Subtle grid -->
  <g class="st-grid-line">
    <path d="M 0 86 L 850 86"/>
    <path d="M 283 0 L 283 172"/>
    <path d="M 566 0 L 566 172"/>
  </g>

  
  <g class="st-bracket">
    <path d="M 17 30 L 17 17 L 30 17"/>
    <path d="M 820 17 L 833 17 L 833 30"/>
    <path d="M 17 142 L 17 155 L 30 155"/>
    <path d="M 820 155 L 833 155 L 833 142"/>
  </g>

  <!-- Title row -->
  <circle cx="36" cy="38" r="3.5" class="st-pulse-dot"/>
  <text x="50" y="42" class="st-title-txt" text-anchor="start" style="font-size:9px;letter-spacing:2px;">ONLINE</text>

  <text x="425" y="42" class="st-title-txt" text-anchor="middle">
    <tspan class="st-title-accent">&#x26A1;</tspan>  Technical  Arsenal
  </text>

  <text x="814" y="42" class="st-title-txt" text-anchor="end" style="font-size:9px;letter-spacing:1.5px;">STACK</text>

  <!-- Divider -->
  <line x1="32" y1="56" x2="818" y2="56" class="st-divider"/>

  <!-- Auto-wrapped tech chips -->
  
    <g class="st-chip-anim" style="animation-delay:0.00s">
      <rect x="60.5" y="72.0" width="48.0" height="28" rx="6" class="st-chip-bg"/>
      <rect x="60.5" y="72.0" width="48.0" height="28" rx="6" class="st-chip-border"/>
      <text x="84.5" y="90.2" class="st-chip-text" text-anchor="middle">C</text>
    </g>
    <g class="st-chip-anim" style="animation-delay:0.04s">
