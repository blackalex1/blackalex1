<svg width="850" height="200" viewBox="0 0 850 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root { 
      --s-bg: #0d1117; 
      --s-accent: #00FFAA; 
      --s-text: #ffffff;
      --s-label: #8b949e;
      --s-grid-op: 0.05;
      
      --l-bg: #0d1117; 
      --l-accent: #00FFAA; 
      --l-accent-light: #00FFAA99; 
      --l-text: #c9d1d9;
      --l-grid-op: 0.05;
      --l-shadow: drop-shadow(0 0 3px #00FFAA);
    }
    @media (prefers-color-scheme: light) {
      :root { 
        --s-bg: #ffffff; 
        --s-accent: #1a7f37; 
        --s-text: #1f2328;
        --s-label: #636c76;
        --s-grid-op: 0.1;
        
        --l-bg: #ffffff; 
        --l-accent: #1a7f37; 
        --l-accent-light: #2da44e; 
        --l-text: #1f2328;
        --l-grid-op: 0.1;
        --l-shadow: none;
      }
    }

    .s-card-bg { fill: var(--s-bg); stroke: #30363d; stroke-width: 2; }
    @media (prefers-color-scheme: light) { .s-card-bg { stroke: #d0d7de; } }

    /* Stats styles */
    .s-label { font: bold 12px 'Segoe UI', Ubuntu, -apple-system, sans-serif; fill: var(--s-label); text-transform: uppercase; letter-spacing: 1.5px; text-anchor: middle; }
    .s-value { font: bold 28px 'JetBrains Mono', 'Cascadia Code', monospace; fill: var(--s-accent); text-anchor: middle; }
    .s-icon { fill: var(--s-accent); opacity: 0.7; }
    .s-grid { stroke: var(--s-accent); opacity: var(--s-grid-op); stroke-width: 1; }
    
    .s-item-anim { opacity: 0; animation: s-fade-in 0.6s forwards; }
    @keyframes s-fade-in { 
      from { opacity: 0; transform: translateY(10px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    /* Languages styles */
    .l-name { font: bold 13px 'Segoe UI', Ubuntu, sans-serif; fill: var(--l-text); }
    .l-pct { font: bold 12px 'JetBrains Mono', 'Courier New', monospace; fill: var(--l-accent); }
    .l-bar-bg { fill: #161b22; opacity: 0.8; }
    @media (prefers-color-scheme: light) { .l-bar-bg { fill: #ebedf0; opacity: 1; } }

    .l-bar-fill { filter: var(--l-shadow); }
    .l-grid { stroke: var(--l-accent); opacity: var(--l-grid-op); stroke-width: 1; }

    .l-item-anim { opacity: 0; animation: l-fade-in 0.5s forwards; }
    @keyframes l-fade-in { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    
    .c-separator { stroke: #30363d; stroke-width: 2; }
    @media (prefers-color-scheme: light) { .c-separator { stroke: #d0d7de; } }
  </style>

  <!-- Single unified background card -->
  <rect width="850" height="200" rx="15" class="s-card-bg"/>
  
  <defs>
    <linearGradient id="s-grad-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--s-accent)" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="var(--s-accent)" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="850" height="200" rx="15" fill="url(#s-grad-bg)"/>

  <!-- Middle vertical separator line -->
  <path d="M 425 0 L 425 200" class="c-separator" />

  <!-- LEFT HALF: Stats (x = 0 to 425) -->
  <g class="s-grid">
    <path d="M 0 100 L 425 100" />
    <path d="M 212.5 0 L 212.5 200" />
  </g>

  <!-- Stars -->
  <g transform="translate(106.25, 65)">
    <g class="s-item-anim" style="animation-delay: 0.1s;">
      <path d="M8 0L10.45 4.96L16 5.76L12 9.66L12.95 15.19L8 12.59L3.05 15.19L4 9.66L0 5.76L5.55 4.96L8 0Z" class="s-icon" transform="translate(-40, -15) scale(0.9)"/>
      <text x="0" y="-2" class="s-label">Stars</text>
      <text x="0" y="32" class="s-value">4</text>
    </g>
  </g>

