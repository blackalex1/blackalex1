name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: General Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          base: header, activity, community, repositories, metadata
          config_timezone: UTC
          extras_css: |
            h2 { color: #00FFAA; }
            text, tspan { fill: #ffffff; }
          committer_branch: output
          
      - name: Top Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile
          plugin_languages_limit: 8
          config_timezone: UTC
          extras_css: |
            h2 { color: #00FFAA; }
            text, tspan { fill: #ffffff; }
          committer_branch: output
